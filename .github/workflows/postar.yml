name: Postar promoções

on:
  schedule:
    - cron: "0 * * * *" # a cada hora — ajuste conforme quiser
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ML_COOKIE_HEADER: ${{ secrets.ML_COOKIE_HEADER }}
          ML_AFFILIATE_TAG: ${{ secrets.ML_AFFILIATE_TAG }}
          MIN_DESCONTO_PERCENTUAL: "5" # TEMPORÁRIO: só pra testar, volte pra 30 depois
        run: python main.py
